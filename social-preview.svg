<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="80%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="top-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="70%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="terminal-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="divider-line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1280" height="640" fill="url(#bg-grad)"/>

  <!-- Dot grid texture -->
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Ambient glow left -->
  <rect width="1280" height="640" fill="url(#glow-left)"/>

  <!-- Ambient glow right -->
  <rect width="1280" height="640" fill="url(#glow-right)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#top-line)"/>

  <!-- ─── LEFT CONTENT ─── -->

  <!-- Eyebrow label -->
  <rect x="72" y="104" width="170" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="157" y="124" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="12" font-weight="500" letter-spacing="1.5" fill="#ffffff" fill-opacity="0.5" text-anchor="middle">CLAUDE CODE</text>

  <!-- Main title -->
  <text x="72" y="232" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="72" font-weight="800" letter-spacing="-3" fill="#ffffff">book-of-claude</text>

  <!-- Underline accent -->
  <rect x="72" y="248" width="560" height="2" rx="1" fill="url(#top-line)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="72" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="20" font-weight="400" fill="#ffffff" fill-opacity="0.5">My actual Claude Code setup — built in production, shared as-is.</text>

  <!-- Stat chips row -->
  <!-- 22 Commands -->
  <rect x="72" y="336" width="162" height="40" rx="20" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="153" y="361" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="14" font-weight="600" fill="#ffffff" fill-opacity="0.85" text-anchor="middle">22 Commands</text>

  <!-- 3 Hooks -->
  <rect x="246" y="336" width="110" height="40" rx="20" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="301" y="361" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="14" font-weight="600" fill="#ffffff" fill-opacity="0.85" text-anchor="middle">3 Hooks</text>

  <!-- 7 Agents -->
  <rect x="368" y="336" width="110" height="40" rx="20" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="423" y="361" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="14" font-weight="600" fill="#ffffff" fill-opacity="0.85" text-anchor="middle">7 Agents</text>

  <!-- 5 Patterns -->
  <rect x="490" y="336" width="120" height="40" rx="20" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="550" y="361" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" font-size="14" font-weight="600" fill="#ffffff" fill-opacity="0.85" text-anchor="middle">5 Patterns</text>

  <!-- Bottom author row -->
  <circle cx="84" cy="510" r="3" fill="#6366f1" opacity="0.9"/>
  <text x="98" y="515" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="14" fill="#ffffff" fill-opacity="0.3">@tealizard · handoffpack.com · MIT</text>

  <!-- ─── DIVIDER ─── -->
  <rect x="700" y="60" width="1" height="520" fill="url(#divider-line)"/>

  <!-- ─── RIGHT SIDE: TERMINAL ─── -->

  <!-- Terminal window -->
  <rect x="740" y="72" width="468" height="496" rx="10" fill="url(#terminal-bg)" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Terminal titlebar -->
  <rect x="740" y="72" width="468" height="38" rx="10" fill="#222222"/>
  <rect x="740" y="90" width="468" height="20" fill="#222222"/>

  <!-- Traffic lights -->
  <circle cx="770" cy="91" r="6" fill="#ff5f57"/>
  <circle cx="792" cy="91" r="6" fill="#febc2e"/>
  <circle cx="814" cy="91" r="6" fill="#28c840"/>

  <!-- Window title -->
  <text x="974" y="96" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#888888" text-anchor="middle">book-of-claude — bash</text>

  <!-- ── Terminal lines ── -->

  <!-- Prompt 1 -->
  <text x="764" y="148" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#6366f1">❯</text>
  <text x="782" y="148" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#e0e0e0"> claude</text>

  <text x="764" y="172" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#28c840">✓</text>
  <text x="782" y="172" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#888888"> CLAUDE.md loaded · 22 commands ready</text>

  <!-- Divider -->
  <line x1="764" y1="190" x2="1188" y2="190" stroke="#333333" stroke-width="1"/>

  <!-- Prompt 2 -->
  <text x="764" y="216" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#6366f1">❯</text>
  <text x="782" y="216" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#e0e0e0"> /burn-rate</text>

  <text x="764" y="240" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#888888">  Session  </text>
  <text x="862" y="240" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#28c840">12K</text>
  <text x="896" y="240" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#888888"> / 200K tokens</text>

  <!-- Divider -->
  <line x1="764" y1="258" x2="1188" y2="258" stroke="#333333" stroke-width="1"/>

  <!-- Prompt 3 -->
  <text x="764" y="284" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#6366f1">❯</text>
  <text x="782" y="284" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#e0e0e0"> /code-review</text>

  <text x="764" y="308" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#3b82f6">↳</text>
  <text x="782" y="308" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#888888"> security-reviewer agent  </text>
  <text x="1055" y="308" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#28c840">done</text>

  <text x="764" y="328" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#3b82f6">↳</text>
  <text x="782" y="328" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#888888"> logic-reviewer agent     </text>
  <text x="1055" y="328" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#28c840">done</text>

  <text x="764" y="348" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#3b82f6">↳</text>
  <text x="782" y="348" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#888888"> ux-reviewer agent        </text>
  <text x="1055" y="348" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#28c840">done</text>

  <!-- Divider -->
  <line x1="764" y1="366" x2="1188" y2="366" stroke="#333333" stroke-width="1"/>

  <!-- Prompt 4 -->
  <text x="764" y="392" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#6366f1">❯</text>
  <text x="782" y="392" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#e0e0e0"> /alpha-squad ship the redesign?</text>

  <text x="764" y="416" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#febc2e">CTO</text>
  <text x="798" y="416" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#888888">  ship it — tech debt is manageable</text>

  <text x="764" y="436" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#febc2e">UX</text>
  <text x="782" y="436" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#888888">   not yet — onboarding needs work ←</text>

  <text x="764" y="456" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#febc2e">COO</text>
  <text x="798" y="456" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#888888">  agree with UX, delay one sprint</text>

  <!-- Divider -->
  <line x1="764" y1="474" x2="1188" y2="474" stroke="#333333" stroke-width="1"/>

  <!-- Final prompt with blinking cursor -->
  <text x="764" y="500" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#6366f1">❯</text>
  <rect x="782" y="487" width="9" height="16" rx="1" fill="#6366f1" opacity="0.8"/>

</svg>
